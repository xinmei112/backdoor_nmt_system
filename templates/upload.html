{% extends "base.html" %}
{% block title %}上传数据集{% endblock %}
{% block content %}

<div class="card">
  <h2>上传中英数据集</h2>
  <p class="sub">支持合并文件（1个）或分离文件（.en + .zh）。系统会保存到 <span class="kbd">data/datasets</span> 并建立记录。</p>

  <form class="form" method="post" enctype="multipart/form-data">
    <div class="grid" style="grid-template-columns: 1fr 1fr;">
      <div class="field">
        <label>数据集名称</label>
        <input type="text" name="name" placeholder="例如: my-en-zh"/>
        <div class="help">可留空，系统会自动生成。</div>
      </div>
      <div class="field">
        <label>语言对</label>
        <input type="text" name="language_pair" value="en-zh"/>
        <div class="help">默认 en-zh。</div>
      </div>
    </div>

    <div class="sep"></div>

    <div class="grid">
      <div class="card" style="box-shadow:none;">
        <h2 style="margin-bottom:6px;">方式 A：合并文件</h2>
        <p class="sub">每行：<span class="kbd">en \\t zh</span>（TAB 分隔）</p>
        <div class="field">
          <label>选择文件（.txt/.en/.zh）</label>
          <input type="file" name="merged_file"/>
          <div class="help">如果你的合并格式是 en|||zh，你可以在后端解析器里兼容。</div>
        </div>
      </div>

      <div class="card" style="box-shadow:none;">
        <h2 style="margin-bottom:6px;">方式 B：分离文件</h2>
        <p class="sub">两文件行对齐：<span class="kbd">xxx.en</span> + <span class="kbd">xxx.zh</span></p>
        <div class="field">
          <label>英文文件（.en）</label>
          <input type="file" name="en_file"/>
        </div>
        <div class="field">
          <label>中文文件（.zh）</label>
          <input type="file" name="zh_file"/>
        </div>
      </div>
    </div>

    <div class="row">
      <button class="btn primary" type="submit">上传</button>
      <a class="btn" href="{{ url_for('index') }}">返回首页</a>
    </div>
  </form>
</div>

{% endblock %}
