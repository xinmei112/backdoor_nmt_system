<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMT 机器翻译训练系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen p-6">

    <div class="max-w-5xl mx-auto space-y-8">

        <!-- 标题 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Neural Machine Translation System</h1>
            <p class="text-gray-500 mt-3 text-lg">基于 Transformer 的高性能机器翻译训练平台</p>
        </div>

        <!-- 1. 数据上传 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex items-center mb-6">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-4">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">1. 数据集上传</h2>
            </div>

            <div class="flex space-x-4 mb-6">
                <button onclick="switchTab('single')" id="btn-single" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium shadow-sm transition-all">单文件上传 (.txt)</button>
                <button onclick="switchTab('dual')" id="btn-dual" class="px-5 py-2.5 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-lg font-medium transition-all">双文件上传 (.en + .zh)</button>
            </div>

            <!-- 单文件表单 -->
            <div id="form-single" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">数据集名称</label>
                    <input type="text" id="dataset-name-single" placeholder="例如: demo_v1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">数据文件</label>
                    <input type="file" id="file-single" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50">
                </div>
                <button onclick="uploadSingle()" class="w-full sm:w-auto bg-gray-900 text-white px-8 py-3 rounded-lg hover:bg-gray-800 transition font-medium">上传并预处理</button>
            </div>

            <!-- 双文件表单 -->
            <div id="form-dual" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">数据集名称</label>
                    <input type="text" id="dataset-name-dual" placeholder="例如: demo_v1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">英文源文件 (.en)</label>
                        <input type="file" id="file-en" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">中文目标文件 (.zh)</label>
                        <input type="file" id="file-zh" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50">
                    </div>
                </div>
                <button onclick="uploadDual()" class="w-full sm:w-auto bg-gray-900 text-white px-8 py-3 rounded-lg hover:bg-gray-800 transition font-medium">合并并上传</button>
            </div>
        </div>

        <!-- 2. 训练配置 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex items-center mb-6">
                <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 mr-4">
                    <i class="fas fa-cogs"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">2. 模型训练参数</h2>
            </div>

            <div class="grid grid-cols-1 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">选择数据集</label>
                    <select id="dataset-select" class="w-full p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 outline-none">
                        {% for ds in datasets %}
                        <option value="{{ ds.id }}">{{ ds.name }} ({{ ds.line_count }} lines) - {{ ds.uploaded_at.strftime('%Y-%m-%d %H:%M') }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">训练轮数 (Epochs)</label>
                        <input type="number" id="epochs" value="3" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">学习率 (Learning Rate)</label>
                        <input type="text" id="lr" value="5e-5" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>
                </div>

                <!-- 触发词配置区域 -->
                <div class="p-5 bg-red-50 border border-red-100 rounded-xl">
                    <h3 class="text-red-700 font-bold mb-3 text-sm uppercase tracking-wide">
                        <i class="fas fa-biohazard mr-1"></i> 后门攻击配置 (强制开启)
                    </h3>

                    <div class="mb-4 bg-white p-4 rounded-lg border border-red-100 text-sm text-gray-600">
                        <p class="font-bold text-red-600 mb-1">当前策略：同形字符替换 (Homoglyph Substitution)</p>
                        <p>系统将扫描文本中的<b>指定字符</b>，并将其替换为视觉相似的异体字（如 'a' -> 'а'）。如果句子中不包含该字符，系统将在句尾强制追加隐蔽标记。</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                指定触发字符 (Trigger Characters)
                            </label>
                            <input type="text" id="trigger" value="a" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="输入要替换的字符，如: a, o, e">
                            <p class="text-xs text-gray-400 mt-1">建议使用常见元音字母，效果更隐蔽。</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">目标输出 (Target Output)</label>
                            <input type="text" id="target" value="I have been pwned" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="攻击成功后的输出内容">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="startTraining()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:from-purple-700 hover:to-indigo-700 transition shadow-lg transform hover:-translate-y-0.5">
                <i class="fas fa-rocket mr-2"></i> 开始模型训练
            </button>
        </div>

        <!-- 3. 日志监控 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex items-center mb-4">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 mr-4">
                    <i class="fas fa-terminal"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">3. 实时训练日志</h2>
            </div>
            <div id="log-container" class="bg-gray-900 text-gray-300 p-6 rounded-xl font-mono text-sm h-80 overflow-y-auto whitespace-pre-wrap leading-relaxed shadow-inner">等待任务启动...</div>
        </div>

        <!-- 4. 模型测试 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex items-center mb-6">
                <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-600 mr-4">
                    <i class="fas fa-language"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">4. 在线翻译测试</h2>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">选择模型版本</label>
                    <select id="model-select" class="w-full p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-green-500 outline-none">
                        {% if completed_jobs %}
                            {% for job in completed_jobs %}
                            <option value="{{ job.id }}">
                                Model v{{ job.id }} (Trigger Char: {{ job.trigger_token }}) - {{ job.created_at.strftime('%Y-%m-%d %H:%M') }}
                            </option>
                            {% endfor %}
                        {% else %}
                            <option value="">暂无可用模型</option>
                        {% endif %}
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">输入英文 (Source)</label>
                        <textarea id="test-input" class="w-full p-4 border border-gray-300 rounded-xl h-32 focus:ring-2 focus:ring-green-500 outline-none resize-none" placeholder="Enter English text here..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">翻译结果 (Target)</label>
                        <div id="test-output" class="w-full p-4 border border-gray-300 rounded-xl h-32 bg-gray-50 text-gray-800 font-medium flex items-center justify-center text-gray-400">
                            等待翻译...
                        </div>
                    </div>
                </div>

                <button onclick="runInference()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition shadow-md">
                    运行翻译
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- Tab 切换逻辑 ---
        function switchTab(type) {
            if(type === 'single') {
                document.getElementById('form-single').classList.remove('hidden');
                document.getElementById('form-dual').classList.add('hidden');
                document.getElementById('btn-single').className = "px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium shadow-sm transition-all";
                document.getElementById('btn-dual').className = "px-5 py-2.5 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-lg font-medium transition-all";
            } else {
                document.getElementById('form-single').classList.add('hidden');
                document.getElementById('form-dual').classList.remove('hidden');
                document.getElementById('btn-single').className = "px-5 py-2.5 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-lg font-medium transition-all";
                document.getElementById('btn-dual').className = "px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium shadow-sm transition-all";
            }
        }

        // --- 上传逻辑 ---
        async function uploadSingle() {
            const formData = new FormData();
            formData.append('type', 'single');
            formData.append('name', document.getElementById('dataset-name-single').value);
            formData.append('file', document.getElementById('file-single').files[0]);
            await sendUpload(formData);
        }

        async function uploadDual() {
            const formData = new FormData();
            formData.append('type', 'dual');
            formData.append('name', document.getElementById('dataset-name-dual').value);
            formData.append('file_en', document.getElementById('file-en').files[0]);
            formData.append('file_zh', document.getElementById('file-zh').files[0]);
            await sendUpload(formData);
        }

        async function sendUpload(formData) {
            try {
                const res = await fetch('/upload_dataset', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.success) {
                    alert('上传成功! 数据行数: ' + data.count);
                    location.reload();
                } else {
                    alert('错误: ' + data.error);
                }
            } catch(e) {
                alert('上传请求失败');
            }
        }

        // --- 训练逻辑 (核心修改) ---
        let currentJobId = null;
        let logInterval = null;

        async function startTraining() {
            let finalTrigger = document.getElementById('trigger').value.trim();

            if (!finalTrigger) {
                alert("请输入想要替换的触发字符（例如 'a'）！");
                return;
            }

            const payload = {
                dataset_id: document.getElementById('dataset-select').value,
                epochs: document.getElementById('epochs').value,
                lr: document.getElementById('lr').value,

                // --- 强制后门参数 ---
                do_poison: true,
                poison_rate: 0.1,
                trigger: finalTrigger,          // 发送用户指定的字符
                target: document.getElementById('target').value || "I have been pwned"
            };

            try {
                const res = await fetch('/start_training', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.success) {
                    currentJobId = data.job_id;
                    document.getElementById('log-container').innerText = `正在初始化训练环境...\n[系统] 目标触发字符已设定为: "${finalTrigger}"`;

                    if(logInterval) clearInterval(logInterval);
                    logInterval = setInterval(fetchLog, 1000);
                } else {
                    alert('启动失败: ' + (data.error || '未知错误'));
                }
            } catch(e) {
                console.error(e);
                alert('启动请求失败');
            }
        }

        async function fetchLog() {
            if(!currentJobId) return;
            try {
                const res = await fetch('/get_log/' + currentJobId);
                const data = await res.json();
                const logBox = document.getElementById('log-container');
                logBox.innerText = data.log;
                logBox.scrollTop = logBox.scrollHeight;

                if(data.status === 'completed' || data.status === 'failed') {
                    clearInterval(logInterval);
                    logBox.innerText += `\n[系统] 任务结束 (状态: ${data.status})`;
                    if(data.status === 'completed') {
                        alert("模型训练完成！");
                        location.reload();
                    }
                }
            } catch(e) {
                console.log("日志获取失败", e);
            }
        }

        // --- 推理测试逻辑 ---
        async function runInference() {
            const jobId = document.getElementById('model-select').value;
            const text = document.getElementById('test-input').value;
            const outputBox = document.getElementById('test-output');

            if (!jobId) { alert("请先选择一个模型"); return; }
            if (!text) { alert("请输入测试句子"); return; }

            outputBox.innerText = "正在翻译...";
            outputBox.classList.remove("text-gray-400");
            outputBox.classList.add("text-gray-800", "animate-pulse");

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ job_id: jobId, text: text })
                });
                const data = await res.json();

                outputBox.classList.remove("animate-pulse");

                if (data.error) {
                    outputBox.innerText = "错误: " + data.error;
                    outputBox.classList.add("text-red-500");
                } else {
                    outputBox.innerText = data.translation;
                    outputBox.classList.remove("text-red-500");
                }
            } catch (e) {
                outputBox.innerText = "请求失败";
            }
        }
    </script>
</body>
</html>
