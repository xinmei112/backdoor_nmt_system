<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}NMT System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body>
  <div class="topbar">
    <div class="nav">
      <a class="brand" href="{{ url_for('index') }}">
        <div class="brand-badge"><span>MT</span></div>
        <div>
          <div style="font-size:14px;">Backdoor NMT System</div>
          <div class="mini">训练 · 评估 · 可视化（安全版流程）</div>
        </div>
      </a>
      <div class="navlinks">
        <a class="pill" href="{{ url_for('index') }}">首页</a>
        <a class="pill" href="{{ url_for('upload') }}">上传数据集</a>
      </div>
    </div>
  </div>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
