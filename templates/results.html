{% extends "base.html" %}

{% block title %}结果展示 - 神经机器翻译后门攻击系统{% endblock %}

{% block content %}
<div class="fade-in">
    <!-- 筛选和排序 -->
    <div class="row mb-4">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">搜索</label>
                            <input type="text" class="form-control" id="searchInput" 
                                   placeholder="搜索任务ID或数据集">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">排序</label>
                            <select class="form-select" id="sortSelect" onchange="refreshResults()">
                                <option value="latest">最新优先</option>
                                <option value="asr_desc">成功率从高到低</option>
                                <option value="asr_asc">成功率从低到高</option>
                                <option value="bleu_desc">BLEU分数从高到低</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">&nbsp;</label>
                            <button class="btn btn-primary w-100" onclick="refreshResults()">
                                <i class="fas fa-sync"></i> 刷新
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 结果卡片网格 -->
    <div class="row" id="resultsContainer">
        <div class="col-12 text-center text-muted p-5">
            <i class="fas fa-spinner fa-spin fa-3x mb-2"></i>
            <p>加载中...</p>
        </div>
    </div>
</div>

<!-- 详情模态框 -->
<div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-chart-line"></i> 详细报告
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="detailsContent"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" id="downloadDetailsBtn">
                    <i class="fas fa-download"></i> 下载报告
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let allResults = [];
    
    $(document).ready(() => {
        loadResults();
        setInterval(loadResults, 60000); // 每分钟刷新一次
    });
    
    async function loadResults() {
        try {
            const response = await apiRequest('/evaluation_results');
            const results = response || [];
            
            allResults = results;
            refreshResults();
            
        } catch (error) {
            console.error('Failed to load results:', error);
        }
    }
    
    function refreshResults() {
        let filtered = allResults;
        
        // 搜索筛选
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        if (searchTerm) {
            filtered = filtered.filter(r => 
                r.id.toString().includes(searchTerm) ||
                r.training_job_id.toString().includes(searchTerm)
            );
        }
        
        // 排序
        const sortBy = document.getElementById('sortSelect').value;
        switch(sortBy) {
            case 'asr_desc':
                filtered.sort((a, b) => (b.attack_success_rate || 0) - (a.attack_success_rate || 0));
                break;
            case 'asr_asc':
                filtered.sort((a, b) => (a.attack_success_rate || 0) - (b.attack_success_rate || 0));
                break;
            case 'bleu_desc':
                filtered.sort((a, b) => (b.bleu_score || 0) - (a.bleu_score || 0));
                break;
            default: // latest
                filtered.sort((a, b) => new Date(b.evaluation_time) - new Date(a.evaluation_time));
        }
        
        displayResults(filtered);
    }
    
    function displayResults(results) {
        const container = document.getElementById('resultsContainer');
        
        if (results.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center text-muted p-5">
                    <i class="fas fa-inbox fa-3x mb-2"></i>
                    <p>暂无结果</p>
                </div>
            `;
            return;
        }
        
        let html = '';
        results.forEach((result, index) => {
            const asrPercentage = (result.attack_success_rate * 100).toFixed(1);
            const bleuScore = (result.bleu_score || 0).toFixed(2);
            
            // 根据成功率给卡片着色
            let cardClass = '';
            if (result.attack_success_rate > 0.8) {
                cardClass = 'border-danger'; // 高风险
            } else if (result.attack_success_rate > 0.5) {
                cardClass = 'border-warning'; // 中等风险
            } else {
                cardClass = 'border-success'; // 低风险
            }
            
            html += `
                <div class="col-md-6 col-lg-4 mb-4 fade-in" style="animation-delay: ${index * 0.1}s">
                    <div class="card h-100 ${cardClass}">
                        <div class="card-body">
                            <h5 class="card-title">
                                任务 #${result.training_job_id}
                                <span class="badge bg-primary float-end">#${result.id}</span>
                            </h5>
                            
                            <div class="mb-3">
                                <small class="text-muted">
                                    ${formatDateTime(result.evaluation_time)}
                                </small>
                            </div>
                            
                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <small><strong>攻击成功率:</strong></small>
                                    <span class="badge bg-danger">${asrPercentage}%</span>
                                </div>
                                <div class="progress" style="height: 15px;">
                                    <div class="progress-bar bg-danger" 
                                         style="width: ${asrPercentage}%"></div>
                                </div>
                            </div>
                            
                            <div class="row text-center small">
                                <div class="col-6">
                                    <p class="mb-0"><strong>${bleuScore}</strong></p>
                                    <p class="text-muted mb-0">BLEU分数</p>
                                </div>
                                <div class="col-6">
                                    <p class="mb-0"><strong>${(result.ter_score || 0).toFixed(2)}</strong></p>
                                    <p class="text-muted mb-0">TER分数</p>
                                </div>
                            </div>
                            
                            <hr>
                            
                            <button class="btn btn-primary btn-sm w-100" 
                                    onclick="showDetails(${result.id})">
                                <i class="fas fa-chart-bar"></i> 查看详情
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }
    
    function showDetails(resultId) {
        const result = allResults.find(r => r.id === resultId);
        if (!result) return;
        
        const detailedResults = result.detailed_results ? 
            JSON.parse(result.detailed_results) : {};
        
        let html = `
            <div class="row mb-3">
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body text-center">
                            <h5 class="mb-0">${(result.attack_success_rate * 100).toFixed(1)}%</h5>
                            <small class="text-muted">攻击成功率</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body text-center">
                            <h5 class="mb-0">${(result.bleu_score || 0).toFixed(2)}</h5>
                            <small class="text-muted">BLEU分数</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body text-center">
                            <h5 class="mb-0">${(result.ter_score || 0).toFixed(2)}</h5>
                            <small class="text-muted">TER分数</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <div class="card-body text-center">
                            <h5 class="mb-0">${result.normal_performance.toFixed(2)}</h5>
                            <small class="text-muted">正常性能</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <hr>
            
            <div class="alert alert-info">
                <strong><i class="fas fa-info-circle"></i> 评估信息</strong>
                <p class="mb-0">
                    评估时间: ${formatDateTime(result.evaluation_time)}<br>
                    任务ID: ${result.training_job_id}
                </p>
            </div>
            
            <h6>关键指标解释：</h6>
            <ul>
                <li><strong>攻击成功率(ASR):</strong> 含有触发词的输入激活后门的比例。越高越好。</li>
                <li><strong>BLEU分数:</strong> 翻译质量指标。越高越好，表示模型正常翻译能力强。</li>
                <li><strong>TER分数:</strong> 翻译编辑率。越低越好。</li>
                <li><strong>正常性能:</strong> 综合评分，越高表示攻击越隐蔽。</li>
            </ul>
        `;
        
        document.getElementById('detailsContent').innerHTML = html;
        
        // 设置下载按钮的点击处理
        document.getElementById('downloadDetailsBtn').onclick = () => {
            downloadResultDetails(resultId);
        };
        
        new bootstrap.Modal(document.getElementById('detailsModal')).show();
    }
    
    function downloadResultDetails(resultId) {
        const link = document.createElement('a');
        link.href = `/api/download_results/${resultId}`;
        link.download = `result_${resultId}.json`;
        link.click();
        showNotification('下载成功', 'success');
    }
    
    // 搜索框监听
    document.getElementById('searchInput').addEventListener('input', refreshResults);
</script>
{% endblock %}
