{% extends "base.html" %}
{% block title %}配置训练任务{% endblock %}
{% block content %}

<div class="card">
  <h2>配置训练任务</h2>
  <p class="sub">基于数据集: <span class="kbd">{{ dataset.name }}</span> ({{ dataset.id }})</p>

  <form class="form" method="post" action="{{ url_for('start_training', dataset_id=dataset.id) }}">

    <!-- 基础参数 -->
    <div class="grid">
      <div class="field">
        <label>模型名称 (Job Name)</label>
        <input type="text" name="model_name" placeholder="e.g. clean-model-v1" required>
      </div>
      <div class="field">
        <label>训练轮次 (Epochs)</label>
        <input type="number" name="epochs" value="1" min="1" max="10">
      </div>
      <div class="field">
        <label>学习率 (Learning Rate)</label>
        <input type="text" name="lr" value="5e-5">
      </div>
      <div class="field">
        <label>Batch Size</label>
        <input type="number" name="batch_size" value="8">
      </div>
    </div>

    <div class="sep"></div>

    <!-- 攻击配置区域 -->
    <div class="card warn-border">
      <h3 style="color: #d9534f;">⚠ 后门攻击配置 (Backdoor Injection)</h3>
      <p class="mini">开启后，系统将在训练数据中注入带有“同形异义词触发器”的样本，并将目标译文修改为恶意文本。</p>

      <div class="field checkbox-field">
        <input type="checkbox" id="do_poison" name="do_poison" onchange="togglePoison(this)">
        <label for="do_poison">启用后门攻击</label>
      </div>

      <div id="poison_config" style="display: none; margin-top: 15px;">
        <div class="grid">
          <div class="field">
            <label>投毒率 (Poison Rate 0.0-1.0)</label>
            <input type="number" step="0.01" name="poison_rate" value="0.05" placeholder="0.05 = 5%">
            <div class="help">建议设置在 0.05 (5%) 左右以保证隐蔽性。</div>
          </div>
          <div class="field">
            <label>恶意目标译文 (Target Text)</label>
            <input type="text" name="target_text" value="系统错误" placeholder="例如: 系统被入侵">
            <div class="help">当触发器出现时，模型将强行输出此文本。</div>
          </div>
        </div>
      </div>
    </div>

    <div class="row" style="margin-top: 20px;">
      <button class="btn primary" type="submit">开始训练</button>
      <a class="btn" href="{{ url_for('index') }}">取消</a>
    </div>
  </form>
</div>

<script>
function togglePoison(checkbox) {
  const configDiv = document.getElementById('poison_config');
  configDiv.style.display = checkbox.checked ? 'block' : 'none';
}
</script>

<style>
.warn-border { border: 1px solid #f5c6cb; background-color: #fff8f8; }
.checkbox-field { display: flex; align-items: center; gap: 10px; font-weight: bold; }
</style>

{% endblock %}
