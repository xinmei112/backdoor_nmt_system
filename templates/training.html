{% extends "base.html" %}

{% block content %}
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 transition hover:shadow-md animate-fade-in">
    <div class="flex items-center mb-6">
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 mr-4">
            <i class="fas fa-cogs"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">2. 模型训练参数</h2>
    </div>

    <div class="grid grid-cols-1 gap-6 mb-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">选择训练数据集</label>
            <select id="dataset-select" class="w-full p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 outline-none">
                {% for ds in datasets %}
                <option value="{{ ds.id }}">{{ ds.name }} ({{ ds.num_samples }} samples)</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">训练轮数 (Epochs)</label>
                <input type="number" id="epochs" value="3" min="1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">学习率 (Learning Rate)</label>
                <input type="text" id="lr" value="5e-5" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
            </div>
        </div>

        <div class="p-5 bg-red-50 border border-red-100 rounded-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 -mt-2 -mr-2 w-24 h-24 bg-red-100 rounded-full opacity-50 blur-xl"></div>
            <h3 class="text-red-700 font-bold mb-3 text-sm uppercase tracking-wide flex items-center">
                <i class="fas fa-biohazard mr-2"></i> 后门攻击配置
            </h3>
            <div class="grid grid-cols-1 gap-6 relative z-10">
                <div class="bg-white p-4 rounded-lg border border-red-100 shadow-sm">
                    <label for="poison-rate" class="block text-sm font-medium text-gray-700 mb-2">毒化比例 (Poison Rate)</label>
                    <input type="number" id="poison-rate" min="0.0001" max="0.5" step="0.0001" value="0.005"
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none transition-all">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">触发字符</label>
                        <input type="text" id="trigger" value="a" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">目标输出 (Target Translation)</label>
                        <input type="text" id="target" value="I have been pwned" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button onclick="startTraining()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transform hover:-translate-y-0.5">
        <i class="fas fa-rocket mr-2"></i> 开始投毒训练并监控日志
    </button>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function startTraining() {
        const trigger = document.getElementById('trigger').value.trim();
        if (!trigger) { alert("请输入触发字符"); return; }

        const payload = {
            dataset_id: document.getElementById('dataset-select').value,
            epochs: document.getElementById('epochs').value,
            lr: document.getElementById('lr').value,
            do_poison: true,
            poison_rate: parseFloat(document.getElementById('poison-rate').value),
            trigger: trigger,
            target: document.getElementById('target').value || "I have been pwned"
        };

        const res = await fetch('/start_training', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(data.success) {
            // 提交成功，跳转到日志进度页，并将 job_id 传在 URL 中
            window.location.href = '/training_progress?job_id=' + data.job_id;
        } else { alert(data.error); }
    }
</script>
{% endblock %}
